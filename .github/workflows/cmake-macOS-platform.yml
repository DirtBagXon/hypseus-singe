name: CMake-MacOS

on:
 workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
      tags:
        description: 'MacOS Build'
env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@master
      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install.sh)"
        if: success()
      - name: Install Dependencies
        run: |
          brew install sdl3
          brew install sdl3_ttf
          brew install sdl3_image
          brew install sdl3_mixer
          brew install libvorbis
          brew install automake
          brew install autoconf
          brew install libtool
          brew install libzip
        if: success()
      - name: Build
        run: |
          mkdir build
          cd build
          cmake ../src
          make
      - name: Package
        run: |
          cp build/hypseus .
          cp screenshots/hypseus-logo.png hypseus.png
          FILES="hypseus LICENSE README.md hypseus.png fonts/ midi/ pics/ roms/ sound/ scripts/"
          zip -r hypseus-singe.zip $FILES
      - name: Create Distribution
        id: vars
        run: |
          ShortSHA=$(git rev-parse --short ${{ github.sha }})
          echo "COMMIT_SHORT_SHA=$ShortSHA" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v6
        with:
          name: hypseus-singe-MacOS-${{ env.COMMIT_SHORT_SHA }}
          path: hypseus-singe.zip

